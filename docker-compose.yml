version: '3.8'

services:
  app:
    build: .
    restart: always
    container_name: portfolio-app
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - portfolio
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    restart: always
    container_name: portfolio-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - portfolio
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  portfolio:
    driver: bridge
